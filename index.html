<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超特急 Song Ranking Maker</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>超特急 Song Ranking Maker</h1>

 <div id="start-screen">

  <h2>遊び方</h2>

  <p>
    好きな曲を選んで、自分だけの超特急楽曲ランキングを作ろう！
  </p>

  <ul>
    <li>左右の曲から好きな方を選択</li>
    <li>引き分けやどっちも好きも選択可能</li>
    <li>選択回数に応じてランキングを作成</li>
  </ul>

  <h2>精度を選択</h2>

<label class="difficulty-card">
  <input type="radio" name="difficulty" value="10">
  <div class="difficulty-info">
    <span class="difficulty-title">test（10問）</span>
    <span class="difficulty-time">約1分</span>
  </div>
</label>

<label class="difficulty-card">
  <input type="radio" name="difficulty" value="100" checked>
  <div class="difficulty-info">
    <span class="difficulty-title">お試し（100問）</span>
    <span class="difficulty-time">約3〜5分</span>
  </div>
</label>

<label class="difficulty-card">
  <input type="radio" name="difficulty" value="200">
  <div class="difficulty-info">
    <span class="difficulty-title">ライト（200問）</span>
    <span class="difficulty-time">約5〜10分</span>
  </div>
</label>

<label class="difficulty-card">
  <input type="radio" name="difficulty" value="300">
  <div class="difficulty-info">
    <span class="difficulty-title">ノーマル（300問）</span>
    <span class="difficulty-time">約8〜15分</span>
  </div>
</label>

<label class="difficulty-card">
  <input type="radio" name="difficulty" value="500">
  <div class="difficulty-info">
    <span class="difficulty-title">ハード（500問）</span>
    <span class="difficulty-time">約15〜25分</span>
  </div>
</label>

<label class="difficulty-card">
  <input type="radio" name="difficulty" value="700">
  <div class="difficulty-info">
    <span class="difficulty-title">ガチ（700問）約20〜35分</span>
    <span class="difficulty-time">「好きは、気合い！」</span>
  </div>
</label>

<button id="startButton">
  スタート！
</button>

</div>   
    
 <div id="game-screen" style="display:none;">

 <div id="progress-area">

  <div id="progress-text">
    0 / 500
  </div>

  <div class="progress-bar">
    <div id="progress-fill"></div>
  </div>

</div>  
  <div class="song-row">

  <div class="song-button" id="leftSong">
    TRAIN
  </div>

  <div class="song-button" id="rightSong">
    Burn!
  </div>

</div>

<div class="sub-buttons">
  <button id="superLikeLeft">👈でっかいLOVE</button>

  <button id="superLikeRight">でっかいLOVE👉</button>
  
  <button id="bothLike">💗どっちも好き💗</button>

  <button id="draw">💭引きわけ💭</button>

  <button id="unknownLeft">⬅️わからない</button>

  <button id="unknownRight">わからない➡️</button>

  <button id="unknownBoth">🌀どっちもわからない🌀</button>

  <button id="skip">スキップ</button>

  <button id="undoButton">↩️ 1回戻る</button>
  
</div>

   <button id="backToTopGame">
  🏠 トップへ
</button>
   
</div>

<div id="result-screen" style="display:none;">

  <h2>🏆 最終結果 🏆</h2>

  <div id="top3"></div>

  <div id="recognition"></div>
  
  <hr>

  <div id="full-ranking"></div>

  <button id="backToStart">
   もう一度ランキングを作る
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
