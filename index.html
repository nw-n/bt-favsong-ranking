<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超特急 Song Ranking Maker</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>超特急 Song Ranking Maker</h1>

    <p class="subtitle">
      178 Songs
    </p>
    
 <div class="song-row">

  <div class="song-button" id="leftSong">
    TRAIN
  </div>

  <div class="vs">
    VS
  </div>

  <div class="song-button" id="rightSong">
    Burn!
  </div>

</div>

<div class="sub-buttons">

  <button id="bothLike">どっちも好き💗</button>

  <button id="draw">引きわけ💭</button>

  <button id="unknownLeft">左だけ知らない🤔</button>

  <button id="unknownRight">右だけ知らない🤔</button>

  <button id="unknownBoth">両方知らない🌀</button>

  <button id="skip">スキップ</button>

</div>

  <script src="script.js"></script>

</body>
</html>
